<!DOCTYPE html>
<html lang="th"><head><base target="_top"><meta charset="UTF-8">
<title>หัวหน้าทีม — <?= brand ?></title>
<?!= include('_styles') ?>
</head><body>
<div id="app"><div class="app"><div class="header"><div class="brand"><?= brand ?></div><h1>เข้าระบบ...</h1></div><div class="content"><div class="loading">⏳</div></div></div></div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<?!= include('_app') ?>
<script>
(async function () {
  const r = await bootApp();
  if (!r) return;
  if (['lead', 'manager', 'owner'].indexOf(r.role) < 0) { renderWrongRole('lead+'); return; }
  renderShell();
  loadTab('dashboard');
})();

function renderShell() {
  U.$('#app').innerHTML = '<div class="app">' +
    '<div class="header"><div class="brand">' + U.esc(APP.brand) + '</div><h1>หัวหน้าทีม</h1>' +
    '<div class="sub">' + U.esc(AUTH.name || '') + ' · <a href="' + pageUrl('leave') + '" style="color:#fff;text-decoration:underline;">ขอลา</a></div></div>' +
    '<div class="content">' +
      '<div class="tabs">' +
        '<div class="tab active" data-tab="dashboard">📊 Dashboard</div>' +
        '<div class="tab" data-tab="blacklist">🚫 Blacklist</div>' +
        '<div class="tab" data-tab="leaves">📋 อนุมัติลา</div>' +
        '<div class="tab" data-tab="audit">👁 Audit</div>' +
      '</div>' +
      '<div id="tabBody"></div>' +
    '</div></div>';
  U.$$('.tab').forEach(function (el) {
    el.addEventListener('click', function () {
      U.$$('.tab').forEach(function (t) { t.classList.remove('active'); });
      el.classList.add('active');
      loadTab(el.dataset.tab);
    });
  });
}

async function loadTab(name) {
  const body = U.$('#tabBody');
  body.innerHTML = '<div class="loading">⏳</div>';
  try {
    if (name === 'dashboard') await renderDashboard();
    else if (name === 'blacklist') await renderBlacklist();
    else if (name === 'leaves') await renderLeaves();
    else if (name === 'audit') await renderAudit();
  } catch (err) { body.innerHTML = '<div class="alert alert-error">' + U.esc(err.message) + '</div>'; }
}

async function renderDashboard() {
  const r = await apiCall('getTeamDashboard');
  const stats = r.stats || [];
  let pending = 0, overdue = 0, bought = 0;
  stats.forEach(function (s) { pending += s.pending; overdue += s.overdue; bought += s.boughtToday; });
  U.$('#tabBody').innerHTML = '<div class="card"><div class="stat-grid">' +
    '<div class="stat-box"><div class="v">' + pending + '</div><div class="k">ค้างคิว</div></div>' +
    '<div class="stat-box"><div class="v red">' + overdue + '</div><div class="k">เลย SLA</div></div>' +
    '<div class="stat-box"><div class="v green">' + bought + '</div><div class="k">ซื้อวันนี้</div></div>' +
    '<div class="stat-box"><div class="v">' + stats.length + '</div><div class="k">พนักงาน</div></div>' +
    '</div></div>' +
    '<div class="card"><h3 style="font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">รายคน</h3>' +
    stats.map(function (s) {
      return '<div class="row" style="padding:8px 0;border-bottom:1px solid var(--border);">' +
        '<div><div style="font-weight:600;">' + U.esc(s.displayName) + (s.onLeave ? ' <span class="badge">ลา</span>' : '') + '</div>' +
        '<div style="font-size:11px;color:var(--muted);">' + U.esc(s.team || '-') + '</div></div>' +
        '<div style="font-size:12px;">ค้าง ' + s.pending + ' · <span style="color:var(--success);">✓ ' + s.boughtToday + '</span></div></div>';
    }).join('') + '</div>';
}

async function renderBlacklist() {
  const r = await apiCall('getBlacklistRequests');
  const list = r.requests || [];
  if (list.length === 0) { U.$('#tabBody').innerHTML = '<div class="card empty">✨ ไม่มีคำขอ</div>'; return; }
  U.$('#tabBody').innerHTML = list.map(function (req) {
    return '<div class="card" data-id="' + U.esc(req.leadId) + '">' +
      '<div style="font-weight:600;">' + U.esc(req.customerName) + '</div>' +
      '<div style="font-size:12px;color:var(--muted);">📱 ' + U.esc(req.phone) + ' · ส่งโดย ' + U.esc(req.requestedBy) + '</div>' +
      '<div style="background:#fef9e7;padding:8px;border-radius:6px;font-size:13px;margin:8px 0;">"' + U.esc(req.reason) + '"</div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button class="btn btn-success approve-btn" style="flex:1;">อนุมัติ</button>' +
        '<button class="btn btn-outline reject-btn" style="flex:1;">ปฏิเสธ</button>' +
      '</div></div>';
  }).join('');
  U.$$('.card[data-id]').forEach(function (row) {
    const id = row.dataset.id;
    row.querySelector('.approve-btn').addEventListener('click', function () { actBL(id, true); });
    row.querySelector('.reject-btn').addEventListener('click', function () { actBL(id, false); });
  });
}

async function actBL(id, approve) {
  const ok = await U.confirm(approve ? 'ยืนยัน Blacklist ลูกค้าคนนี้?' : 'ปฏิเสธคำขอ blacklist?', {
    danger: approve, okText: approve ? 'Blacklist' : 'ปฏิเสธ',
  });
  if (!ok) return;
  try {
    await apiCall('approveBlacklist', { leadId: id, approve: approve });
    U.toast(approve ? 'Blacklist แล้ว' : 'ปฏิเสธแล้ว');
    renderBlacklist();
  } catch (e) { U.toast(e.message, true); }
}

async function renderLeaves() {
  const r = await apiCall('getPendingLeaves');
  const list = r.pending || [];
  if (list.length === 0) { U.$('#tabBody').innerHTML = '<div class="card empty">✨ ไม่มีคำขอลา</div>'; return; }
  U.$('#tabBody').innerHTML = list.map(function (l) {
    return '<div class="card" data-id="' + U.esc(l.leaveId) + '">' +
      '<div style="font-weight:600;">' + U.esc(l.employeeName) + '</div>' +
      '<div style="font-size:13px;">' + U.esc(l.startDate) + ' ถึง ' + U.esc(l.endDate) + ' (' + U.esc(l.leaveType) + ')</div>' +
      '<div style="font-size:12px;color:var(--muted);margin:4px 0;">"' + U.esc(l.reason || '-') + '"</div>' +
      '<div style="display:flex;gap:8px;margin-top:8px;">' +
        '<button class="btn btn-success approve-btn" style="flex:1;">อนุมัติ</button>' +
        '<button class="btn btn-outline reject-btn" style="flex:1;">ปฏิเสธ</button>' +
      '</div></div>';
  }).join('');
  U.$$('.card[data-id]').forEach(function (row) {
    const id = row.dataset.id;
    row.querySelector('.approve-btn').addEventListener('click', function () { actLeave(id, true); });
    row.querySelector('.reject-btn').addEventListener('click', function () { actLeave(id, false); });
  });
}

async function actLeave(id, approve) {
  let reason = '';
  if (!approve) {
    reason = await U.prompt('เหตุผลที่ไม่อนุมัติ?', { title: 'ปฏิเสธคำขอลา', required: true });
    if (!reason) return;
  } else {
    const ok = await U.confirm('อนุมัติคำขอลา?');
    if (!ok) return;
  }
  try {
    await apiCall('approveLeave', { leaveId: id, approve: approve, rejectionReason: reason });
    U.toast(approve ? 'อนุมัติแล้ว' : 'ปฏิเสธแล้ว');
    renderLeaves();
  } catch (e) { U.toast(e.message, true); }
}

async function renderAudit() {
  const r = await apiCall('getAuditCopy', { days: 7 });
  const list = r.stats || [];
  U.$('#tabBody').innerHTML = '<div class="card">' +
    '<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">7 วันล่าสุด · threshold copy ≥ ' + r.threshold + '</div>' +
    (list.length === 0 ? '<p class="empty">ไม่มีข้อมูล</p>' :
      list.map(function (s) {
        return '<div class="row" style="padding:8px 0;border-bottom:1px solid var(--border);' + (s.anomaly ? 'background:#fef2f2;' : '') + '">' +
          '<div style="font-weight:600;">' + U.esc(s.displayName) + (s.anomaly ? ' 🚨' : '') + '</div>' +
          '<div style="font-size:12px;">copy ' + s.copy + ' / call ' + s.call + '</div></div>';
      }).join('')) +
    '</div>';
}
</script>
</body></html>
