<!DOCTYPE html>
<html lang="th"><head><base target="_top"><meta charset="UTF-8">
<title>My ID — <?= brand ?></title>
<?!= include('_styles') ?>
</head><body>
<div class="app">
  <div class="header"><div class="brand"><?= brand ?></div><h1>My LINE User ID</h1>
    <div class="sub">ส่ง ID ให้ admin เพื่อลงทะเบียน</div></div>
  <div class="content">
    <div class="card" style="text-align:center;">
      <p style="color:var(--muted);font-size:13px;">User ID ของคุณ</p>
      <div class="copy-id-box" id="uidbox">กำลังโหลด...</div>
      <button class="btn btn-primary btn-block" id="copyBtn" disabled>📋 คัดลอก User ID</button>
      <p style="font-size:12px;color:var(--muted);margin-top:14px;">ชื่อ LINE: <span id="dn">-</span></p>
    </div>
  </div>
</div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<?!= include('_app') ?>
<script>
(async function () {
  try {
    const p = await initLiff();
    U.$('#uidbox').textContent = p.userId;
    U.$('#dn').textContent = p.displayName;
    const btn = U.$('#copyBtn');
    btn.disabled = false;
    btn.addEventListener('click', function () { U.copy(p.userId); });
  } catch (err) {
    U.$('#uidbox').textContent = 'Error: ' + err.message;
  }
})();
</script>
</body></html>
