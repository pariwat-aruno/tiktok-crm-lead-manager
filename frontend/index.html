<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8">
<title>TikTok CRM</title>
<style>
  :root {
    --primary: #c8102e;
    --primary-dark: #9a0c24;
    --primary-light: #fff5f5;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
    --success: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, "Helvetica Neue", "Sukhumvit Set", "Noto Sans Thai", sans-serif;
    font-size: 15px; background: #fafafa; color: var(--text); line-height: 1.5;
  }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; padding-bottom: 60px; }
  .header { background: var(--primary); color: #fff; padding: 14px 16px; }
  .brand { font-size: 11px; opacity: .85; letter-spacing: 1px; text-transform: uppercase; }
  .header h1 { font-size: 18px; margin-top: 2px; }
  .header .sub { font-size: 12px; opacity: .85; margin-top: 2px; }
  .content { padding: 14px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .btn { display: inline-block; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; font-family: inherit; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-block { display: block; width: 100%; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .input, .textarea, .select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; }
  .textarea { min-height: 80px; resize: vertical; }
  .loading { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .alert { padding: 10px 12px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
  .alert-error { background: #fee2e2; color: var(--danger); }
  .alert-warn { background: #fef3c7; color: #92400e; }
  .alert-success { background: #dcfce7; color: #15803d; }
  .alert-info { background: var(--primary-light); color: var(--primary-dark); }
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 12px; overflow-x: auto; }
  .tab { flex: none; padding: 12px 14px; cursor: pointer; border-bottom: 3px solid transparent; font-size: 13px; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 8px; background: #fef3c7; color: #92400e; }
  .badge-overdue { background: #fee2e2; color: var(--danger); }
  .badge-info { background: #dbeafe; color: #1e40af; }
  .badge-success { background: #dcfce7; color: #15803d; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .stat-box { background: #f9fafb; padding: 12px; border-radius: 8px; text-align: center; }
  .stat-box .v { font-size: 22px; font-weight: 700; }
  .stat-box .v.red { color: var(--danger); }
  .stat-box .v.green { color: var(--success); }
  .stat-box .k { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: flex-end; z-index: 100; }
  .modal { background: #fff; width: 100%; max-width: 480px; margin: 0 auto; border-radius: 12px 12px 0 0; padding: 16px; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--primary-dark); }
  .toast { position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 8px; z-index: 9999; font-size: 14px; }
  .toast.error { background: var(--danger); }
  .copy-id-box { background: #f9fafb; padding: 14px; border-radius: 8px; margin: 14px 0; font-family: monospace; word-break: break-all; font-size: 12px; border: 1px solid var(--border); }
  .back-link { display: inline-block; padding: 8px 0; color: var(--primary); cursor: pointer; font-weight: 600; }
  .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
  .row .k { color: var(--muted); }
  .img-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
  .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; }
  .upload-zone input { display: none; }
</style>

</head><body>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var rawState = params.get('liff.state');
  if (!rawState) return; // ไม่มี liff.state → แสดง landing page ปกติ

  var LIFF_ID = "2010082378-Dyr6fRBQ";
  var pageMap = {
    id: 'myid', myid: 'myid',
    reg: 'register', register: 'register',
    app: 'app',
    staff: 'staff', lead: 'lead', manager: 'manager', owner: 'owner',
    leave: 'leave', genmenu: 'genmenu', menu: 'genmenu'
  };

  function routeNow() {
    var state = String(rawState).replace(/^\/+/, '');
    var path = state.split('?')[0].replace(/\.html$/i, '').toLowerCase();
    var target = pageMap[path];
    if (!target) return;
    var base = window.location.href.replace(/[^\/]*$/, '').split('?')[0];
    // ส่ง query ทั้งหมดต่อ (ยกเว้น liff.state) — รวม login params ที่ LIFF ใส่มา
    var fwd = new URLSearchParams(window.location.search);
    fwd.delete('liff.state');
    var inner = state.indexOf('?') >= 0 ? state.slice(state.indexOf('?') + 1) : '';
    if (inner) new URLSearchParams(inner).forEach(function (v, k) { fwd.set(k, v); });
    var qs = fwd.toString();
    window.location.replace(base + target + '.html' + (qs ? '?' + qs : ''));
  }

  // liff.init() ก่อน เพื่อให้ LIFF SDK resolve login state + เก็บไว้
  // แล้วค่อย route — กัน loop (app.html จะเห็น logged in แล้ว ไม่ liff.login ซ้ำ)
  if (typeof liff === 'undefined') { routeNow(); return; }
  liff.init({ liffId: LIFF_ID }).then(routeNow).catch(routeNow);
}());
</script>
<div class="app">
  <div class="header"><div class="brand">TikTok CRM</div><h1>เลือกหน้า</h1>
    <div class="sub">เปิดผ่าน LIFF จะ auto-route ตาม role</div></div>
  <div class="content">
    <a href="app.html" style="text-decoration:none;color:inherit;">
      <div class="card"><div style="font-weight:700;">🚀 เปิดระบบ (Auto)</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">Auto-detect role + redirect</div></div></a>
    <a href="register.html" style="text-decoration:none;color:inherit;">
      <div class="card"><div style="font-weight:700;">📝 ลงทะเบียนพนักงานใหม่</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">ส่งข้อมูล + selfie + บัตรประชาชน</div></div></a>
    <a href="myid.html" style="text-decoration:none;color:inherit;">
      <div class="card"><div style="font-weight:700;">🆔 My LINE User ID</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">คัดลอก ID ส่งให้ admin</div></div></a>
  </div></div>
</body></html>
